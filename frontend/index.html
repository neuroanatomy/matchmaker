<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Maker</title>

  <!-- Paper.js for the stereographic landmark overlay (step 3) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>

  <!-- Three.js r165 via CDN — importmap lets bare specifiers resolve -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f1a;
      --panel:     #1a1a2e;
      --border:    #2a2a4a;
      --accent:    #6c8ebf;
      --accent2:   #7ec8a4;
      --text:      #d0d0e8;
      --muted:     #6060a0;
      --sidebar-w: 180px;
      --rpanel-w:  260px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 13px; }
    body { display: flex; flex-direction: column; overflow: hidden; }

    /* ── Top bar ── */
    #topbar {
      display: flex; align-items: center; gap: 12px;
      height: 40px; padding: 0 16px;
      background: var(--panel); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 15px; font-weight: 600; letter-spacing: .5px; color: #fff; }
    #topbar h1 span { color: var(--accent2); }
    #status-badge {
      margin-left: auto; display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--muted);
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; transition: background .4s;
    }
    #status-dot.connected    { background: #4caf50; }
    #status-dot.disconnected { background: #f44336; }

    /* ── Layout ── */
    #layout { display: flex; flex: 1; overflow: hidden; }

    /* ── Sidebar ── */
    #sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--panel); border-right: 1px solid var(--border);
      padding: 16px 0; display: flex; flex-direction: column; gap: 2px;
    }
    .step-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px; cursor: pointer;
      border: none; background: none; color: var(--muted);
      text-align: left; font-size: 12px; width: 100%;
      transition: color .15s, background .15s;
    }
    .step-btn:hover  { background: rgba(108,142,191,.1); color: var(--text); }
    .step-btn.active { background: rgba(108,142,191,.18); color: #fff; }
    .step-btn.done   { color: var(--accent2); }
    .step-num {
      width: 20px; height: 20px; border-radius: 50%;
      border: 1px solid currentColor; display: flex;
      align-items: center; justify-content: center;
      font-size: 10px; flex-shrink: 0;
    }
    .step-btn.active .step-num { background: var(--accent); border-color: var(--accent); color: #fff; }
    .step-btn.done   .step-num { background: var(--accent2); border-color: var(--accent2); color: #fff; }

    /* ── Centre (viewer) ── */
    #viewer-container { flex: 1; position: relative; overflow: hidden; background: #0d0d1f; }
    .viewer-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 13px; text-align: center;
      white-space: pre-line; pointer-events: none;
    }

    /* ── Right panel ── */
    #rpanel {
      width: var(--rpanel-w); flex-shrink: 0;
      background: var(--panel); border-left: 1px solid var(--border);
      overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 0;
    }
    #rpanel h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 12px; }
    #rpanel-content { display: flex; flex-direction: column; gap: 6px; flex: 1; }

    /* ── Slot tabs (ref / mov) ── */
    .slot-tabs { display: flex; gap: 2px; margin-bottom: 4px; }
    .slot-tab {
      flex: 1; padding: 5px 0; font-size: 11px; font-weight: 600;
      border: 1px solid var(--border); border-radius: 4px;
      background: none; color: var(--muted); cursor: pointer;
      transition: all .15s;
    }
    .slot-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .slot-status { font-size: 11px; color: var(--accent2); min-height: 16px; }

    /* ── Subject roster ── */
    .subject-roster { display: flex; flex-direction: column; gap: 2px; margin-bottom: 4px; }
    .subject-row {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 6px; border-radius: 4px; cursor: pointer;
      border: 1px solid transparent; transition: background .12s;
    }
    .subject-row:hover { background: rgba(108,142,191,.12); }
    .subject-row.active { background: rgba(108,142,191,.2); border-color: var(--accent); }
    .subject-row-info { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; overflow: hidden; }
    .subject-row-id { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; }
    .subject-row-file { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .subject-dots { display: flex; gap: 3px; flex-shrink: 0; }
    .subject-dots .dot { font-size: 8px; color: var(--border); }
    .subject-dots .dot.dot-on { color: var(--accent2); }
    .remove-btn {
      flex-shrink: 0; background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 14px; line-height: 1; padding: 0 2px;
      border-radius: 3px; transition: color .12s;
    }
    .remove-btn:hover { color: #f55; }
    .remove-confirm {
      font-size: 11px; color: var(--text); padding: 4px 6px;
      background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
      margin-top: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .remove-confirm-yes {
      padding: 2px 8px; font-size: 11px; border: none; border-radius: 3px;
      background: #c0392b; color: #fff; cursor: pointer;
    }
    .remove-confirm-no {
      padding: 2px 8px; font-size: 11px; border: 1px solid var(--border);
      border-radius: 3px; background: none; color: var(--muted); cursor: pointer;
    }
    /* Preprocess inline chips */
    .pre-chips { display: flex; gap: 4px; margin-left: auto; flex-shrink: 0; }
    .pre-chip { font-size: 10px; padding: 1px 5px; border-radius: 8px; font-family: monospace; }
    .pre-chip.pre-done { background: rgba(126,200,164,.2); color: var(--accent2); }
    .pre-chip.pre-missing { background: rgba(255,255,255,.05); color: var(--muted); }
    /* Align landmark count badge */
    .sulci-badge { font-size: 10px; color: var(--accent2); margin-left: 4px; }
    /* Match subject selects */
    .match-subject-select {
      flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 11px; padding: 3px 6px;
    }

    /* ── Quick-load pills ── */
    .quickload-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-top: 8px; }
    .quickload-pills { display: flex; gap: 4px; flex-wrap: wrap; }
    .pill-btn {
      padding: 3px 9px; font-size: 11px;
      border: 1px solid var(--border); border-radius: 12px;
      background: none; color: var(--text); cursor: pointer;
      transition: all .15s;
    }
    .pill-btn:hover { background: rgba(108,142,191,.2); border-color: var(--accent); }

    /* ── Separator label ── */
    .sep-label { text-align: center; font-size: 10px; color: var(--muted); margin: 6px 0; }

    /* ── File browser ── */
    .fb-container { flex: 1; overflow-y: auto; max-height: 260px; }
    .fb-entry {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 4px; border-radius: 4px; cursor: pointer;
      color: var(--text); font-size: 12px;
      transition: background .12s;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .fb-entry:hover    { background: rgba(108,142,191,.15); }
    .fb-entry .icon    { flex-shrink: 0; font-size: 14px; }
    .fb-entry .name    { overflow: hidden; text-overflow: ellipsis; }
    .fb-entry.selected { background: rgba(108,142,191,.25); color: #fff; }
    .fb-breadcrumb     { font-size: 11px; color: var(--muted); margin-bottom: 8px; word-break: break-all; }
    .fb-back-btn {
      font-size: 11px; color: var(--accent); background: none;
      border: none; cursor: pointer; padding: 0 0 8px 0;
    }
    .fb-back-btn:hover { text-decoration: underline; }
    .fb-loading, .fb-error { font-size: 11px; color: var(--muted); padding: 6px 0; }
    .fb-error { color: #f55; }

    /* ── Buttons ── */
    .load-btn {
      margin-top: 8px; width: 100%; padding: 7px;
      background: var(--accent); border: none; border-radius: 4px;
      color: #fff; font-size: 12px; cursor: pointer; transition: opacity .15s;
    }
    .load-btn:disabled { opacity: .4; cursor: default; }
    .load-btn:not(:disabled):hover { opacity: .85; }

    .coming-soon { color: var(--muted); font-size: 12px; margin-top: 8px; }

    /* ── Progress bar ── */
    .progress-bar-wrap { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; margin: 6px 0; }
    .progress-bar { height: 100%; background: var(--accent2); width: 0%; transition: width .25s; }

    /* ── Spherize panel ── */
    .sph-section  { display: flex; flex-direction: column; gap: 3px; padding: 4px 0; }
    .sph-label    { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }
    .sph-path     { font-size: 11px; color: var(--text); word-break: break-all; }
    .sph-done     { font-size: 11px; color: var(--accent2); }
    .sph-divider  { height: 1px; background: var(--border); margin: 6px 0; }
    /* ── Load panel — view controls ── */
    .view-section { margin: 6px 0 4px; padding: 6px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 2px; }

    /* ── Preprocess panel ── */
    .pre-header   { display: flex; align-items: baseline; gap: 4px; margin-bottom: 4px; }
    .pre-filename { font-size: 11px; color: var(--text); }
    .pre-check    { font-size: 11px; padding-left: 8px; font-family: monospace; }
    .pre-done     { color: var(--accent2); }
    .pre-missing  { color: var(--muted); }
    .sph-item       { font-size: 11px; color: var(--text); font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sph-item-active { color: var(--accent); font-weight: 600; }
    .sph-tex-active  { color: var(--accent2); font-weight: 600; }
    .sph-clickable { cursor: pointer; border-radius: 3px; padding: 1px 3px; margin: -1px -3px; transition: background .12s; }
    .sph-clickable:hover { background: rgba(108,142,191,.2); }

    /* ── Match roster ── */
    .match-roster-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 0; font-size: 0.85rem;
    }
    .match-roster-name {
      flex: 1; font-weight: 500; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; font-size: 11px; color: var(--text);
    }
    .match-roster-status {
      color: var(--muted); font-size: 10px; white-space: nowrap; flex-shrink: 0;
    }
    .roster-load-btn {
      font-size: 11px; padding: 2px 8px; border-radius: 4px;
      background: var(--accent); color: #fff; border: none; cursor: pointer;
      flex-shrink: 0; transition: opacity .15s;
    }
    .roster-load-btn:disabled { opacity: .4; cursor: default; }
    .roster-load-btn:not(:disabled):hover { opacity: .85; }
    .roster-del-btn {
      font-size: 12px; padding: 2px 5px; border-radius: 3px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); cursor: pointer;
      flex-shrink: 0; transition: color .12s, border-color .12s;
    }
    .roster-del-btn:hover { color: #e05252; border-color: #e05252; }

    /* ── Match panel ── */
    .match-desc { font-size: 11px; color: var(--muted); margin: 2px 0 4px; }
    .out-dir-input {
      width: 100%; box-sizing: border-box; margin: 4px 0;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 11px; padding: 4px 6px; font-family: monospace;
    }
    .param-row { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
    .param-label { font-size: 11px; color: var(--muted); flex: 0 0 90px; }
    .param-row input[type=range] { flex: 1 1 0; min-width: 0; accent-color: var(--accent); }
    .param-val { font-size: 11px; color: var(--text); width: 48px; flex-shrink: 0; text-align: right; }
    input.param-val { background: transparent; border: 1px solid var(--border); border-radius: 3px; padding: 1px 3px; outline: none; color: var(--text); -moz-appearance: textfield; }
    input.param-val:focus { border-color: var(--accent); }
    input.param-val::-webkit-inner-spin-button, input.param-val::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .steps-group { display: flex; gap: 2px; }
    .step-seg {
      padding: 3px 8px; font-size: 11px; border: 1px solid var(--border);
      border-radius: 3px; background: none; color: var(--muted); cursor: pointer;
      transition: all .12s;
    }
    .step-seg.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .step-seg:hover:not(.active) { background: rgba(108,142,191,.1); color: var(--text); }
    .advanced-details { font-size: 11px; margin: 6px 0; }
    .advanced-details summary { color: var(--muted); cursor: pointer; padding: 2px 0; user-select: none; list-style: none; }
    .advanced-details summary::-webkit-details-marker { display: none; }
    .advanced-details summary::before { content: '▶'; display: inline-block; margin-right: 4px; transition: transform .2s; }
    .advanced-details[open] summary::before { transform: rotate(90deg); }
    .advanced-details summary:hover { color: var(--text); }
    @keyframes pulse { 0%,100% { opacity: .4; } 50% { opacity: 1; } }
    .progress-bar.pulsing { animation: pulse 1.5s infinite; width: 100%; }

    /* ── Trajectory panel ── */
    .traj-info { font-size: 11px; color: var(--accent2); margin-top: 4px; }
    .traj-row  { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 11px; color: var(--muted); }
    .traj-row label { flex-shrink: 0; }
    .traj-speed { flex: 1; accent-color: var(--accent); }
    .traj-pp-label { display: flex; align-items: center; gap: 4px; cursor: pointer; user-select: none; }
    /* Playback controls row inside right panel */
    .traj-ctrl-row { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
    .traj-play-rp {
      width: 20px; height: 20px; border-radius: 50%;
      border: 1px solid var(--accent); background: none;
      color: var(--accent); font-size: 10px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s; padding: 0;
    }
    .traj-play-rp:hover { background: rgba(108,142,191,.2); }
    .traj-scrub-rp { flex: 1; min-width: 0; accent-color: var(--accent2); cursor: pointer; }
    .traj-time-rp { font-size: 10px; color: var(--muted); flex-shrink: 0; width: 28px; text-align: right; font-family: monospace; }
    .traj-seq-label { font-size: 10px; color: var(--muted); margin: 4px 0 2px; }
    .traj-seq-list  { display: flex; flex-direction: column; gap: 2px; margin-bottom: 4px; }
    .traj-seq-row   { display: flex; align-items: center; gap: 3px; padding: 2px 0; }
    .traj-seq-id    { flex: 1; font-size: 11px; color: var(--text); }
    .traj-seq-btn   {
      font-size: 10px; padding: 1px 5px; border-radius: 3px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border); cursor: pointer;
      transition: color .12s, border-color .12s; line-height: 1.4;
    }
    .traj-seq-btn:hover:not(:disabled) { color: var(--text); border-color: var(--accent); }
    .traj-seq-btn:disabled { opacity: .3; cursor: default; }
    .traj-seq-rm:hover { color: #e05252; border-color: #e05252; }
    .traj-add-row   { margin-top: 2px; }
    .traj-add-select {
      width: 100%; font-size: 11px; padding: 3px 5px; border-radius: 4px;
      background: var(--bg2); border: 1px solid var(--border); color: var(--text);
    }
    .traj-pairs  { margin-top: 4px; }
    .traj-pair-row  { display: flex; align-items: center; gap: 5px; font-size: 11px; padding: 1px 0; }
    .traj-pair-icon { flex-shrink: 0; }
    .traj-pair-ok   { color: var(--accent2); }
    .traj-pair-inv  { color: #c8963a; }
    .traj-pair-miss { color: var(--muted); }

    /* ── Align step — tool bar ── */
    .align-tools { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 6px; }
    .tool-btn {
      flex: 1; padding: 5px 4px; font-size: 10px; font-weight: 600;
      border: 1px solid var(--border); border-radius: 4px;
      background: none; color: var(--muted); cursor: pointer;
      transition: all .15s; min-width: 40px;
    }
    .tool-btn:hover  { background: rgba(108,142,191,.1); color: var(--text); }
    .tool-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tool-btn.rotate { background: rgba(126,200,164,.12); color: var(--accent2); }
    .tool-btn.rotate.active { background: var(--accent2); border-color: var(--accent2); color: #1a1a2e; }

    /* ── Align step — landmark list ── */
    .landmark-list { display: flex; flex-direction: column; gap: 3px; margin: 6px 0; max-height: 160px; overflow-y: auto; }
    .landmark-item {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; padding: 3px 4px; border-radius: 3px;
      border: 1px solid transparent; cursor: pointer; transition: background .12s;
    }
    .landmark-item:hover { background: rgba(108,142,191,.12); }
    .landmark-item.selected { border-color: var(--accent); background: rgba(108,142,191,.18); }
    .landmark-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .landmark-name {
      flex: 1; font-size: 11px; color: var(--text);
      background: none; border: none; outline: none; padding: 0;
      cursor: text;
    }
    .landmark-name:focus { border-bottom: 1px solid var(--accent); cursor: text; }
    .landmark-del {
      font-size: 10px; color: var(--muted); background: none; border: none;
      cursor: pointer; padding: 0 2px;
    }
    .landmark-del:hover { color: #f55; }

    /* ── Align step — view mode row ── */
    .view-row {
      display: flex; align-items: center; gap: 3px;
      padding: 4px 0;
      border-top: 1px dashed var(--border);
      margin: 3px 0 6px;
    }
    .view-row-label {
      font-size: 9px; text-transform: uppercase; letter-spacing: .6px;
      color: var(--muted); flex-shrink: 0; margin-right: 2px;
    }
    .view-row-sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
    .view-btn {
      flex: none; min-width: 34px; padding: 4px 7px;
      font-size: 10px; font-weight: 600;
      border: 1px solid var(--border); border-radius: 4px;
      background: none; color: var(--muted); cursor: pointer; transition: all .15s;
    }
    .view-btn:hover:not(:disabled) { background: rgba(126,200,164,.12); color: var(--accent2); }
    .view-btn.active { background: var(--accent2); border-color: var(--accent2); color: #1a1a2e; font-weight: 700; }
    .view-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Align step — rotation sliders ── */
    .rot-section {
      border-top: 1px dashed var(--border);
      padding: 6px 0 8px; margin: 3px 0 4px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .rot-label {
      font-size: 9px; text-transform: uppercase; letter-spacing: .6px;
      color: var(--muted); margin-bottom: 2px;
    }
    .rot-row { display: flex; align-items: center; gap: 6px; }
    .rot-row-label {
      min-width: 42px; font-size: 10px; color: var(--muted); flex-shrink: 0;
    }
    .rot-row input[type=range] { flex: 1 1 0; min-width: 0; accent-color: var(--accent2); cursor: pointer; }
    .rot-row-val {
      width: 34px; text-align: right; font-size: 10px;
      color: var(--text); font-family: monospace; flex-shrink: 0;
    }

    /* ── Align step — UPS container ── */
    .ups-section { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .ups-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 6px; }

    /* ── Right-panel resize handle ── */
    #rpanel-resizer {
      width: 5px; flex-shrink: 0;
      background: transparent; border-left: 1px solid var(--border);
      cursor: col-resize; transition: background .15s;
    }
    #rpanel-resizer:hover, #rpanel-resizer.dragging { background: var(--accent); }

    /* ── Status bar ── */
    #statusbar {
      height: 28px; padding: 0 16px; flex-shrink: 0;
      display: flex; align-items: center;
      background: var(--panel); border-top: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
    }

    /* ── Project creation modal ─────────────────────────────────────────── */
    .pm-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .pm-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px; padding: 24px; width: min(480px, 90vw);
      display: flex; flex-direction: column; gap: 8px;
    }
    .pm-title { margin: 0 0 4px; font-size: 15px; font-weight: 600; }
    .pm-desc  { margin: 0 0 8px; font-size: 12px; color: var(--muted); }
    .pm-label { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .pm-input {
      width: 100%; box-sizing: border-box;
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 13px; padding: 6px 8px;
    }
    .pm-input:focus { outline: none; border-color: var(--accent2); }
    .pm-error { color: #e07070; font-size: 12px; margin-top: 4px; }
    .pm-btns  { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
    .pm-btn   {
      padding: 7px 16px; border-radius: 4px; font-size: 13px;
      cursor: pointer; border: none;
    }
    .pm-btn-cancel  { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
    .pm-btn-confirm { background: var(--accent2); color: #fff; }
    .pm-btn:hover { opacity: .85; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>Match <span>Maker</span></h1>
  <div id="status-badge">
    <div id="status-dot" class="disconnected"></div>
    <span id="status-text">Connecting…</span>
  </div>
</div>

<div id="layout">
  <nav id="sidebar">
    <button class="step-btn active" data-step="1" onclick="app.goStep(1)">
      <span class="step-num">1</span> Load
    </button>
    <button class="step-btn" data-step="2" onclick="app.goStep(2)">
      <span class="step-num">2</span> Preprocess
    </button>
    <button class="step-btn" data-step="3" onclick="app.goStep(3)">
      <span class="step-num">3</span> Align
    </button>
    <button class="step-btn" data-step="4" onclick="app.goStep(4)">
      <span class="step-num">4</span> Match
    </button>
    <button class="step-btn" data-step="5" onclick="app.goStep(5)">
      <span class="step-num">5</span> Trajectory
    </button>
  </nav>

  <div id="viewer-container">
    <div class="viewer-placeholder">Select a mesh file to load it here.</div>
  </div>

  <div id="rpanel-resizer"></div>
  <div id="rpanel">
    <h2>Load meshes</h2>
    <div id="rpanel-content"></div>
  </div>
</div>

<!-- Status bar -->
<div id="statusbar"><span id="status-msg">Ready.</span></div>

<!-- Right-panel resize -->
<script>
(function () {
  const resizer = document.getElementById('rpanel-resizer');
  const rpanel  = document.getElementById('rpanel');
  const root    = document.documentElement;
  const MIN_W   = 160;
  const MAX_W   = 560;

  resizer.addEventListener('mousedown', function (e) {
    e.preventDefault();
    resizer.classList.add('dragging');
    const startX  = e.clientX;
    const startW  = rpanel.offsetWidth;

    function onMove(ev) {
      const delta = startX - ev.clientX;
      const newW  = Math.min(MAX_W, Math.max(MIN_W, startW + delta));
      root.style.setProperty('--rpanel-w', newW + 'px');
    }
    function onUp() {
      resizer.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });
})();
</script>

<!-- Single module entry point — imports everything else -->
<script type="module" src="app.js"></script>

</body>
</html>
